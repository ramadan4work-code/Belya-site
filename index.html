<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Belya - Marble Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ground: #C4A574;
      --ground-dark: #A68B5B;
      --chalk: #F5F5F5;
      --ruby: #E63946;
      --sapphire: #1D3557;
      --emerald: #2D6A4F;
      --amber: #F4A261;
      --amethyst: #7B2CBF;
      --pearl: #F1FAEE;
      --cue-white: #FFFFFF;
      --throw-line: #8B4513;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Fredoka', sans-serif;
      background: linear-gradient(135deg, #8B7355 0%, #6B5344 100%);
      min-height: 100vh;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    #gameContainer {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #uiTop {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      z-index: 10;
      background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, transparent 100%);
    }

    .ui-box {
      background: rgba(0,0,0,0.5);
      color: var(--pearl);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.95rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #levelDisplay {
      font-size: 0.85rem;
    }

    #levelDisplay span {
      color: var(--amber);
      font-size: 1.1rem;
    }

    #scoreDisplay .marble-icon {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff 0%, #FF6B6B 50%, #A82937 100%);
      border: 2px solid #333;
    }

    #turnIndicator {
      display: none;
    }

    #resetBtn {
      background: rgba(0,0,0,0.5);
      border: none;
      color: var(--pearl);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #soundBtn {
      background: rgba(0,0,0,0.5);
      border: none;
      color: var(--pearl);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    #soundBtn.muted {
      opacity: 0.5;
      color: #888;
    }

    #soundBtn:active {
      transform: scale(0.9);
    }

    #hintText {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: var(--pearl);
      padding: 8px 20px;
      border-radius: 15px;
      font-size: 0.85rem;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 10;
      text-align: center;
      max-width: 90%;
    }

    #canvas {
      display: block;
    }

    #menuOverlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(5px);
      padding: 20px;
    }

    #menuOverlay.hidden {
      display: none;
    }

    .menu-title {
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--pearl);
      text-shadow: 3px 3px 0 var(--ground-dark);
      margin-bottom: 25px;
      letter-spacing: 4px;
    }

    .menu-section {
      margin-bottom: 20px;
      text-align: center;
    }

    .menu-label {
      color: var(--amber);
      font-size: 0.85rem;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .menu-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 320px;
    }

    .menu-btn {
      background: linear-gradient(145deg, var(--ground) 0%, var(--ground-dark) 100%);
      border: 2px solid var(--pearl);
      color: var(--pearl);
      padding: 10px 18px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 90px;
    }

    .menu-btn:active {
      transform: scale(0.95);
    }

    .menu-btn.selected {
      background: linear-gradient(145deg, var(--amber) 0%, #c4813a 100%);
      box-shadow: 0 3px 12px rgba(244, 162, 97, 0.4);
    }

    .menu-btn.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #startBtn {
      background: linear-gradient(145deg, var(--emerald) 0%, #1e4a38 100%);
      padding: 15px 50px;
      font-size: 1.2rem;
      margin-top: 25px;
      box-shadow: 0 5px 18px rgba(45, 106, 79, 0.5);
    }

    .instructions {
      background: rgba(0,0,0,0.4);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      max-width: 320px;
      text-align: center;
    }

    .instructions p {
      color: var(--pearl);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .instructions .highlight-white {
      color: #fff;
      font-weight: 600;
    }

    .instructions .highlight-red {
      color: var(--ruby);
      font-weight: 600;
    }

    .level-preview {
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      padding: 12px;
      margin-top: 15px;
      text-align: center;
    }

    .level-preview .level-title {
      color: var(--amber);
      font-size: 1rem;
      margin-bottom: 5px;
    }

    .level-preview .level-info {
      color: var(--pearl);
      font-size: 0.85rem;
      opacity: 0.8;
    }

    #winOverlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    #winOverlay.show {
      display: flex;
    }

    .win-text {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--amber);
      text-shadow: 2px 2px 0 var(--ground-dark);
      margin-bottom: 15px;
    }

    .win-score {
      font-size: 1.3rem;
      color: var(--pearl);
      margin-bottom: 10px;
    }

    .stars-display {
      font-size: 2.5rem;
      margin-bottom: 15px;
      letter-spacing: 5px;
    }

    .star {
      display: inline-block;
      opacity: 0.3;
      transition: all 0.3s ease;
    }

    .star.earned {
      opacity: 1;
      text-shadow: 0 0 15px #FFD700;
    }

    #shotCounter {
      font-size: 0.85rem;
      color: var(--pearl);
      opacity: 0.8;
      margin-bottom: 5px;
    }

    .win-buttons {
      display: flex;
      gap: 15px;
    }

    .win-btn {
      background: linear-gradient(145deg, var(--emerald) 0%, #1e4a38 100%);
      border: 3px solid var(--pearl);
      color: var(--pearl);
      padding: 12px 30px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
    }

    .win-btn.secondary {
      background: linear-gradient(145deg, var(--ground) 0%, var(--ground-dark) 100%);
    }

    .floating-score {
      position: absolute;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--amber);
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
      pointer-events: none;
      animation: floatUp 1s ease-out forwards;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-50px) scale(1.4); }
    }

    .figure-icon {
      font-size: 1.3rem;
      margin-right: 4px;
    }

    .ball-preview {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .preview-cue {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff 0%, #e0e0e0 50%, #999 100%);
      border: 1.5px solid #555;
    }

    .preview-vs {
      color: var(--amber);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <div id="uiTop">
      <div class="ui-box" id="levelDisplay">Level <span id="levelValue">1</span></div>
      <div class="ui-box" id="scoreDisplay">
        <span id="scoreValue">0</span> / <span id="totalBalls">0</span>
        <span style="opacity: 0.6; font-size: 0.8rem;">•</span>
        <span style="font-size: 0.85rem;">Shots: <span id="shotsDisplay">0</span></span>
      </div>
      <div style="display: flex; gap: 8px;">
        <button id="soundBtn">🔊</button>
        <button id="resetBtn">↺</button>
      </div>
    </div>

    <div id="hintText">Drag from your white ball to aim and shoot</div>
    <canvas id="canvas"></canvas>

    <div id="menuOverlay">
      <div class="menu-title">BELY A</div>

      <div class="instructions">
        <p>Use your <span class="highlight-white">white ball</span> to strike the <span class="highlight-red">colored balls</span> out of the figure!</p>
        <p>Start from the throwing line below the figure.</p>
      </div>

      <div class="menu-section">
        <button class="menu-btn" id="menuSoundBtn" style="width: auto; padding: 8px 20px;">🔊 Sound On</button>
      </div>

      <div class="menu-section">
        <div class="menu-label">Game Mode</div>
        <div class="menu-buttons">
          <button class="menu-btn selected" data-mode="solo">Solo</button>
          <button class="menu-btn" data-mode="vs">VS Player</button>
        </div>
      </div>

      <div class="menu-section">
        <div class="menu-label">Select Figure & Balls</div>
        <div class="menu-buttons" id="figureButtons">
        </div>
      </div>

      <div class="level-preview" id="levelPreview">
        <div class="level-title">Level 1</div>
        <div class="level-info">Triangle • 3 balls</div>
      </div>

      <button class="menu-btn" id="startBtn">Play</button>
    </div>

    <div id="winOverlay">
      <div class="win-text" id="winText">Level Complete!</div>
      <div class="stars-display" id="starsDisplay">
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
      </div>
      <div id="shotCounter">Shots: <span id="shotValue">0</span></div>
      <div class="win-score" id="winScore">Score: 0</div>
      <div class="win-buttons">
        <button class="win-btn" id="nextLevelBtn">Next Level</button>
        <button class="win-btn secondary" id="menuBtn2">Menu</button>
      </div>
    </div>
  </div>

  <script>
    // Level configurations
    const LEVELS = [
      { shape: 'triangle', balls: 3, name: 'Triangle', icon: '△' },
      { shape: 'square', balls: 4, name: 'Square', icon: '□' },
      { shape: 'diamond', balls: 4, name: 'Diamond', icon: '◇' },
      { shape: 'triangle', balls: 6, name: 'Big Triangle', icon: '△' },
      { shape: 'pentagon', balls: 5, name: 'Pentagon', icon: '⬠' },
      { shape: 'hexagon', balls: 6, name: 'Hexagon', icon: '⬡' },
      { shape: 'square', balls: 8, name: 'Big Square', icon: '□' },
      { shape: 'circle', balls: 6, name: 'Circle', icon: '○' },
      { shape: 'star', balls: 6, name: 'Star', icon: '☆' },
      { shape: 'hexagon', balls: 9, name: 'Big Hexagon', icon: '⬡' },
      { shape: 'cross', balls: 8, name: 'Cross', icon: '✚' },
      { shape: 'octagon', balls: 8, name: 'Octagon', icon: '⯁' },
      { shape: 'circle', balls: 10, name: 'Big Circle', icon: '○' },
      { shape: 'star', balls: 10, name: 'Big Star', icon: '☆' },
      { shape: 'decagon', balls: 10, name: 'Decagon', icon: '⯃' }
    ];

    // Figure point generators
    function getFigurePoints(shape, centerX, centerY, radius) {
      const shapes = {
        triangle: (cx, cy, r) => {
          const h = r * 0.866;
          return [
            { x: cx, y: cy - h * 0.67 },
            { x: cx - r / 2, y: cy + h * 0.33 },
            { x: cx + r / 2, y: cy + h * 0.33 }
          ];
        },
        square: (cx, cy, r) => {
          const s = r * 0.85;
          return [
            { x: cx - s, y: cy - s },
            { x: cx + s, y: cy - s },
            { x: cx + s, y: cy + s },
            { x: cx - s, y: cy + s }
          ];
        },
        diamond: (cx, cy, r) => {
          return [
            { x: cx, y: cy - r },
            { x: cx + r * 0.7, y: cy },
            { x: cx, y: cy + r },
            { x: cx - r * 0.7, y: cy }
          ];
        },
        pentagon: (cx, cy, r) => {
          const points = [];
          for (let i = 0; i < 5; i++) {
            const angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
            points.push({ x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r });
          }
          return points;
        },
        hexagon: (cx, cy, r) => {
          const points = [];
          for (let i = 0; i < 6; i++) {
            const angle = (i / 6) * Math.PI * 2;
            points.push({ x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r });
          }
          return points;
        },
        circle: (cx, cy, r) => {
          const points = [];
          for (let i = 0; i < 16; i++) {
            const angle = (i / 16) * Math.PI * 2;
            points.push({ x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r });
          }
          return points;
        },
        star: (cx, cy, r) => {
          const points = [];
          for (let i = 0; i < 10; i++) {
            const angle = (i / 10) * Math.PI * 2 - Math.PI / 2;
            const dist = i % 2 === 0 ? r : r * 0.5;
            points.push({ x: cx + Math.cos(angle) * dist, y: cy + Math.sin(angle) * dist });
          }
          return points;
        },
        octagon: (cx, cy, r) => {
          const points = [];
          for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2 + Math.PI / 8;
            points.push({ x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r });
          }
          return points;
        },
        cross: (cx, cy, r) => {
          const arm = r * 0.35;
          return [
            { x: cx - r, y: cy - arm },
            { x: cx - arm, y: cy - arm },
            { x: cx - arm, y: cy - r },
            { x: cx + arm, y: cy - r },
            { x: cx + arm, y: cy - arm },
            { x: cx + r, y: cy - arm },
            { x: cx + r, y: cy + arm },
            { x: cx + arm, y: cy + arm },
            { x: cx + arm, y: cy + r },
            { x: cx - arm, y: cy + r },
            { x: cx - arm, y: cy + arm },
            { x: cx - r, y: cy + arm }
          ];
        },
        decagon: (cx, cy, r) => {
          const points = [];
          for (let i = 0; i < 10; i++) {
            const angle = (i / 10) * Math.PI * 2 - Math.PI / 2;
            points.push({ x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r });
          }
          return points;
        }
      };
      
      return shapes[shape] ? shapes[shape](centerX, centerY, radius) : shapes.triangle(centerX, centerY, radius);
    }

    // Audio
    let audioCtx = null;
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playSound(type) {
      if (!audioCtx || !game.soundEnabled) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      switch(type) {
        case 'push':
          osc.frequency.setValueAtTime(200, audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.15);
          gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.15);
          break;
        case 'score':
          osc.type = 'sine';
          osc.frequency.setValueAtTime(523, audioCtx.currentTime);
          osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
          osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
          gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.4);
          break;
        case 'collide':
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(600 + Math.random() * 200, audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.08);
          gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.08);
          break;
        case 'win':
          const notes = [523, 659, 784, 1047];
          notes.forEach((freq, i) => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g);
            g.connect(audioCtx.destination);
            o.type = 'sine';
            o.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.15);
            g.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.15);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.3);
            o.start(audioCtx.currentTime + i * 0.15);
            o.stop(audioCtx.currentTime + i * 0.15 + 0.3);
          });
          break;
        case 'levelup':
          const notes2 = [392, 523, 659, 784, 1047];
          notes2.forEach((freq, i) => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g);
            g.connect(audioCtx.destination);
            o.type = 'sine';
            o.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.1);
            g.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.1);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.2);
            o.start(audioCtx.currentTime + i * 0.1);
            o.stop(audioCtx.currentTime + i * 0.1 + 0.2);
          });
          break;
      }
    }

    // Game State
    const game = {
      mode: 'solo',
      currentLevel: 0,
      cueBall: null,
      targetBalls: [],
      scores: [0, 0],
      currentPlayer: 0,
      figurePoints: [],
      figureCenter: { x: 0, y: 0 },
      figureRadius: 0,
      throwingLineY: 0,
      dragging: false,
      dragStart: { x: 0, y: 0 },
      dragEnd: { x: 0, y: 0 },
      gameOver: false,
      canShoot: true,
      pocketedThisTurn: 0,
      soundEnabled: true,
      ballsStoppedFrames: 0,
      shotsTaken: 0  // Track number of shots taken
    };

    const MARBLE_COLORS = [
      { main: '#E63946', light: '#FF6B6B', dark: '#A82937' },
      { main: '#1D3557', light: '#457B9D', dark: '#0D1B2A' },
      { main: '#2D6A4F', light: '#40916C', dark: '#1B4332' },
      { main: '#F4A261', light: '#FFCB8E', dark: '#C4813A' },
      { main: '#7B2CBF', light: '#9D4EDD', dark: '#5A189A' },
      { main: '#E9C46A', light: '#FFF1B8', dark: '#C9A227' },
      { main: '#2A9D8F', light: '#40B4A6', dark: '#1E7268' },
      { main: '#F77F00', light: '#FFB347', dark: '#C46200' }
    ];

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreValue = document.getElementById('scoreValue');
    const totalBalls = document.getElementById('totalBalls');
    const levelValue = document.getElementById('levelValue');
    const turnIndicator = document.getElementById('turnIndicator');
    const menuOverlay = document.getElementById('menuOverlay');
    const winOverlay = document.getElementById('winOverlay');
    const winText = document.getElementById('winText');
    const winScore = document.getElementById('winScore');
    const gameContainer = document.getElementById('gameContainer');
    const hintText = document.getElementById('hintText');
    const levelPreview = document.getElementById('levelPreview');
    const figureButtons = document.getElementById('figureButtons');

    let groundPattern = null;

    // Generate figure selection buttons
    function generateFigureButtons() {
      figureButtons.innerHTML = '';
      LEVELS.forEach((level, index) => {
        const btn = document.createElement('button');
        btn.className = 'menu-btn' + (index === game.currentLevel ? ' selected' : '');
        btn.dataset.level = index;
        btn.innerHTML = `<span class="figure-icon">${level.icon}</span>${level.balls}`;
        btn.addEventListener('click', () => {
          game.currentLevel = index;
          document.querySelectorAll('#figureButtons .menu-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          updateLevelPreview();
        });
        figureButtons.appendChild(btn);
      });
    }

    function updateLevelPreview() {
      const level = LEVELS[game.currentLevel];
      levelPreview.innerHTML = `
        <div class="level-title">Level ${game.currentLevel + 1}: ${level.name}</div>
        <div class="level-info">${level.balls} balls to clear</div>
      `;
    }

    function createGroundTexture() {
      const patternCanvas = document.createElement('canvas');
      patternCanvas.width = 100;
      patternCanvas.height = 100;
      const pctx = patternCanvas.getContext('2d');
      
      pctx.fillStyle = '#C4A574';
      pctx.fillRect(0, 0, 100, 100);
      
      for (let i = 0; i < 500; i++) {
        const x = Math.random() * 100;
        const y = Math.random() * 100;
        const alpha = Math.random() * 0.3;
        pctx.fillStyle = Math.random() > 0.5 ? `rgba(139, 115, 85, ${alpha})` : `rgba(196, 165, 116, ${alpha})`;
        pctx.fillRect(x, y, 2, 2);
      }
      
      for (let i = 0; i < 5; i++) {
        pctx.fillStyle = `rgba(107, 83, 68, ${Math.random() * 0.2})`;
        pctx.beginPath();
        pctx.arc(Math.random() * 100, Math.random() * 100, Math.random() * 15 + 5, 0, Math.PI * 2);
        pctx.fill();
      }
      
      pctx.strokeStyle = '#5D7A3D';
      pctx.lineWidth = 1;
      for (let i = 0; i < 8; i++) {
        const gx = Math.random() * 100;
        const gy = Math.random() * 100;
        for (let j = 0; j < 3; j++) {
          pctx.beginPath();
          pctx.moveTo(gx, gy);
          pctx.lineTo(gx + (Math.random() - 0.5) * 8, gy - Math.random() * 8 - 3);
          pctx.stroke();
        }
      }
      
      pctx.fillStyle = '#A89080';
      for (let i = 0; i < 6; i++) {
        const px = Math.random() * 100;
        const py = Math.random() * 100;
        const ps = Math.random() * 3 + 1;
        pctx.beginPath();
        pctx.ellipse(px, py, ps, ps * 0.7, Math.random() * Math.PI, 0, Math.PI * 2);
        pctx.fill();
      }
      
      groundPattern = ctx.createPattern(patternCanvas, 'repeat');
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      createGroundTexture();
      if (game.targetBalls.length > 0 || game.cueBall) {
        setupLevel();
        initBalls();
      }
    }

    function setupLevel() {
      const level = LEVELS[game.currentLevel];
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2 - 40; // Shift figure up a bit
      const size = Math.min(canvas.width, canvas.height) * 0.26;
      
      game.figureRadius = size;
      game.figureCenter = { x: centerX, y: centerY };
      game.figurePoints = getFigurePoints(level.shape, centerX, centerY, size);
      
      // Throwing line is ~6-7cm below the figure (scaled to pixels)
      // More distance for better gameplay
      game.throwingLineY = centerY + game.figureRadius + 220;
      
      // Clamp to canvas bounds
      if (game.throwingLineY > canvas.height - 50) {
        game.throwingLineY = canvas.height - 50;
      }
    }

    function initBalls() {
      const level = LEVELS[game.currentLevel];
      const ballCount = level.balls;
      const cueRadius = 22;
      const targetRadius = 20;
      
      // Cue ball starts on the throwing line, centered
      const cueX = game.figureCenter.x;
      const cueY = game.throwingLineY;
      
      game.cueBall = {
        x: cueX,
        y: cueY,
        vx: 0,
        vy: 0,
        radius: cueRadius,
        startX: cueX,
        startY: cueY,
        color: { main: '#FFFFFF', light: '#FFFFFF', dark: '#CCCCCC', outline: '#555555' },
        isCue: true
      };
      
      game.targetBalls = [];
      
      const points = game.figurePoints;
      
      for (let i = 0; i < ballCount; i++) {
        const colorIndex = i % MARBLE_COLORS.length;
        let pos;
        
        if (points.length <= 4) {
          pos = { ...points[i % points.length] };
          const angle = ((i % points.length) / points.length) * Math.PI * 2;
          pos.x = game.figureCenter.x + Math.cos(angle) * (game.figureRadius * 0.5);
          pos.y = game.figureCenter.y + Math.sin(angle) * (game.figureRadius * 0.5);
        } else {
          const angle = (i / ballCount) * Math.PI * 2 - Math.PI / 2;
          const dist = game.figureRadius * (0.3 + Math.random() * 0.4);
          pos = {
            x: game.figureCenter.x + Math.cos(angle) * dist,
            y: game.figureCenter.y + Math.sin(angle) * dist
          };
        }
        
        // Avoid overlapping
        let attempts = 0;
        while (attempts < 20) {
          let overlap = false;
          for (const ball of game.targetBalls) {
            const dx = pos.x - ball.x;
            const dy = pos.y - ball.y;
            if (Math.sqrt(dx * dx + dy * dy) < targetRadius * 3) {
              overlap = true;
              break;
            }
          }
          if (!overlap) break;
          
          const angle = Math.random() * Math.PI * 2;
          const dist = Math.random() * game.figureRadius * 0.6;
          pos = {
            x: game.figureCenter.x + Math.cos(angle) * dist,
            y: game.figureCenter.y + Math.sin(angle) * dist
          };
          attempts++;
        }
        
        game.targetBalls.push({
          x: pos.x,
          y: pos.y,
          vx: 0,
          vy: 0,
          radius: targetRadius,
          color: MARBLE_COLORS[colorIndex],
          active: true
        });
      }
      
      game.scores = [0, 0];
      game.currentPlayer = 0;
      game.gameOver = false;
      game.canShoot = true;
      game.pocketedThisTurn = 0;
      game.ballsStoppedFrames = 0;
      game.shotsTaken = 0;
      document.getElementById('shotValue').textContent = '0';
      document.getElementById('shotsDisplay').textContent = '0';
      
      updateUI();
      updateHint();
    }

    function updateHint() {
      if (game.canShoot) {
        hintText.style.opacity = '1';
        hintText.textContent = 'Drag from your white ball to aim';
      } else {
        hintText.style.opacity = '0.3';
        hintText.textContent = 'Wait for balls to stop...';
      }
    }

    function updateUI() {
      scoreValue.textContent = game.scores[0];
      totalBalls.textContent = LEVELS[game.currentLevel].balls;
      levelValue.textContent = game.currentLevel + 1;
    }

    function isInsideFigure(x, y) {
      const points = game.figurePoints;
      let inside = false;
      
      for (let i = 0, j = points.length - 1; i < points.length; j = i++) {
        const xi = points[i].x, yi = points[i].y;
        const xj = points[j].x, yj = points[j].y;
        
        if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
          inside = !inside;
        }
      }
      
      return inside;
    }

    function drawGround() {
      if (groundPattern) {
        ctx.fillStyle = groundPattern;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      } else {
        ctx.fillStyle = '#C4A574';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function drawThrowingLine() {
      const y = game.throwingLineY;
      const lineWidth = 200;
      const centerX = game.figureCenter.x;
      
      ctx.save();
      
      // Line shadow
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(centerX - lineWidth, y + 2);
      ctx.lineTo(centerX + lineWidth, y + 2);
      ctx.stroke();
      
      // Main dashed line
      ctx.strokeStyle = '#8B4513';
      ctx.lineWidth = 4;
      ctx.setLineDash([15, 10]);
      ctx.beginPath();
      ctx.moveTo(centerX - lineWidth, y);
      ctx.lineTo(centerX + lineWidth, y);
      ctx.stroke();
      
      // End dots
      ctx.setLineDash([]);
      ctx.fillStyle = '#8B4513';
      ctx.beginPath();
      ctx.arc(centerX - lineWidth, y, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(centerX + lineWidth, y, 6, 0, Math.PI * 2);
      ctx.fill();
      
      // Label
      ctx.fillStyle = 'rgba(139, 69, 19, 0.8)';
      ctx.font = '600 11px Fredoka';
      ctx.textAlign = 'center';
      ctx.fillText('THROW LINE', centerX, y + 22);
      
      ctx.restore();
    }

    function drawFigure() {
      ctx.strokeStyle = '#F5F5F5';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      // Shadow
      ctx.save();
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(game.figurePoints[0].x + 3, game.figurePoints[0].y + 3);
      for (let i = 1; i < game.figurePoints.length; i++) {
        ctx.lineTo(game.figurePoints[i].x + 3, game.figurePoints[i].y + 3);
      }
      ctx.closePath();
      ctx.stroke();
      ctx.restore();
      
      // Main chalk line
      ctx.strokeStyle = 'rgba(245, 245, 245, 0.9)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(game.figurePoints[0].x, game.figurePoints[0].y);
      for (let i = 1; i < game.figurePoints.length; i++) {
        ctx.lineTo(game.figurePoints[i].x, game.figurePoints[i].y);
      }
      ctx.closePath();
      ctx.stroke();
      
      // Chalk texture
      ctx.setLineDash([5, 15]);
      ctx.strokeStyle = 'rgba(245, 245, 245, 0.3)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.setLineDash([]);
      
      // Corner marks
      ctx.fillStyle = 'rgba(245, 245, 245, 0.5)';
      for (const point of game.figurePoints) {
        ctx.beginPath();
        ctx.arc(point.x, point.y, 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawBall(ball) {
      const { x, y, radius, color } = ball;
      
      ctx.save();
      
      // Shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.beginPath();
      ctx.ellipse(x + 3, y + 5, radius, radius * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Main body
      const gradient = ctx.createRadialGradient(x - radius * 0.3, y - radius * 0.3, 0, x, y, radius);
      gradient.addColorStop(0, color.light);
      gradient.addColorStop(0.5, color.main);
      gradient.addColorStop(1, color.dark);
      
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
      
      // Highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
      ctx.beginPath();
      ctx.ellipse(x - radius * 0.25, y - radius * 0.3, radius * 0.35, radius * 0.25, -0.5, 0, Math.PI * 2);
      ctx.fill();
      
      // Specular
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.beginPath();
      ctx.arc(x - radius * 0.4, y - radius * 0.45, radius * 0.12, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.restore();
    }

    function drawCueBall() {
      if (!game.cueBall) return;
      
      const ball = game.cueBall;
      const { x, y, radius } = ball;
      
      ctx.save();
      
      // Glow effect
      ctx.shadowColor = '#FFFFFF';
      ctx.shadowBlur = game.canShoot ? 15 : 6;
      
      // Shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
      ctx.beginPath();
      ctx.ellipse(x + 3, y + 5, radius, radius * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Body gradient (white marble)
      const gradient = ctx.createRadialGradient(x - radius * 0.35, y - radius * 0.35, 0, x, y, radius);
      gradient.addColorStop(0, '#FFFFFF');
      gradient.addColorStop(0.4, '#F5F5F5');
      gradient.addColorStop(0.7, '#E8E8E8');
      gradient.addColorStop(1, '#CCCCCC');
      
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
      
      // Outline
      ctx.strokeStyle = '#666666';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.stroke();
      
      // Large highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.beginPath();
      ctx.ellipse(x - radius * 0.3, y - radius * 0.35, radius * 0.4, radius * 0.28, -0.5, 0, Math.PI * 2);
      ctx.fill();
      
      // Specular
      ctx.fillStyle = 'rgba(255, 255, 255, 1)';
      ctx.beginPath();
      ctx.arc(x - radius * 0.45, y - radius * 0.5, radius * 0.12, 0, Math.PI * 2);
      ctx.fill();
      
      // Ready indicator
      if (game.canShoot && !game.dragging) {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.arc(x, y, radius + 5, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      
      ctx.restore();
    }

    function drawAimingLine() {
      if (!game.dragging || !game.cueBall || !game.canShoot) return;
      
      const cue = game.cueBall;
      const dx = game.dragStart.x - game.dragEnd.x;
      const dy = game.dragStart.y - game.dragEnd.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist < 10) return;
      
      const power = Math.min(dist * 0.12, 20);
      const angle = Math.atan2(dy, dx);
      
      const lineLength = 60 + power * 4;
      const endX = cue.x + Math.cos(angle) * lineLength;
      const endY = cue.y + Math.sin(angle) * lineLength;
      
      ctx.save();
      
      // Main line
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cue.x, cue.y);
      ctx.lineTo(endX, endY);
      ctx.stroke();
      
      // Glow line
      ctx.strokeStyle = 'rgba(200, 200, 200, 0.5)';
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.moveTo(cue.x, cue.y);
      ctx.lineTo(endX, endY);
      ctx.stroke();
      
      // Power dot
      ctx.fillStyle = '#E8E8E8';
      ctx.strokeStyle = '#666666';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(endX, endY, 6 + power * 0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      
      // Cue ball highlight
      ctx.fillStyle = `rgba(255, 255, 255, ${0.5 + power / 40})`;
      ctx.beginPath();
      ctx.arc(cue.x, cue.y, cue.radius + 3, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.restore();
    }

    function createFloatingScore(x, y, amount) {
      const div = document.createElement('div');
      div.className = 'floating-score';
      div.textContent = `+${amount}`;
      div.style.left = `${x}px`;
      div.style.top = `${y}px`;
      gameContainer.appendChild(div);
      
      setTimeout(() => div.remove(), 1000);
    }

    function areBallsMoving() {
      // Check total velocity magnitude (speed) instead of individual components
      const speedThreshold = 0.3;
      
      if (game.cueBall) {
        const speed = Math.sqrt(game.cueBall.vx * game.cueBall.vx + game.cueBall.vy * game.cueBall.vy);
        if (speed > speedThreshold) return true;
      }
      
      for (const ball of game.targetBalls) {
        if (ball.active) {
          const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
          if (speed > speedThreshold) return true;
        }
      }
      
      return false;
    }

    function stopAllBalls() {
      // Force all balls to stop completely
      if (game.cueBall) {
        game.cueBall.vx = 0;
        game.cueBall.vy = 0;
      }
      for (const ball of game.targetBalls) {
        ball.vx = 0;
        ball.vy = 0;
      }
    }

    function updatePhysics() {
      const friction = 0.985;
      const bounce = 0.6;
      const stopThreshold = 0.2; // Speed below which we stop the ball completely
      
      const allBalls = [game.cueBall, ...game.targetBalls.filter(b => b.active)];
      
      for (const ball of allBalls) {
        if (!ball) continue;
        
        const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
        
        if (speed < stopThreshold) {
          // Ball is slow enough - stop it completely
          ball.vx = 0;
          ball.vy = 0;
        } else {
          // Apply physics
          ball.x += ball.vx;
          ball.y += ball.vy;
          ball.vx *= friction;
          ball.vy *= friction;
          
          // Boundary bounce
          if (ball.x < ball.radius) { ball.x = ball.radius; ball.vx *= -bounce; }
          if (ball.x > canvas.width - ball.radius) { ball.x = canvas.width - ball.radius; ball.vx *= -bounce; }
          if (ball.y < ball.radius + 60) { ball.y = ball.radius + 60; ball.vy *= -bounce; }
          if (ball.y > canvas.height - ball.radius) { ball.y = canvas.height - ball.radius; ball.vy *= -bounce; }
        }
      }
      
      // Ball collisions
      for (let i = 0; i < allBalls.length; i++) {
        for (let j = i + 1; j < allBalls.length; j++) {
          const ballA = allBalls[i];
          const ballB = allBalls[j];
          if (!ballA || !ballB) continue;
          
          const dx = ballB.x - ballA.x;
          const dy = ballB.y - ballA.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const minDist = ballA.radius + ballB.radius;
          
          if (dist < minDist && dist > 0) {
            const nx = dx / dist;
            const ny = dy / dist;
            const overlap = minDist - dist;
            
            ballA.x -= nx * overlap * 0.5;
            ballA.y -= ny * overlap * 0.5;
            ballB.x += nx * overlap * 0.5;
            ballB.y += ny * overlap * 0.5;
            
            const dvx = ballA.vx - ballB.vx;
            const dvy = ballA.vy - ballB.vy;
            const dvn = dvx * nx + dvy * ny;
            
            if (dvn > 0) {
              ballA.vx -= dvn * nx;
              ballA.vy -= dvn * ny;
              ballB.vx += dvn * nx;
              ballB.vy += dvn * ny;
              
              playSound('collide');
            }
          }
        }
      }
      
      // Check for pocketed balls
      for (const ball of game.targetBalls) {
        if (!ball.active) continue;
        
        const ballSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
        const insideFigure = isInsideFigure(ball.x, ball.y);
        
        if (!insideFigure && ballSpeed < stopThreshold) {
          ball.active = false;
          ball.vx = 0;
          ball.vy = 0;
          game.scores[game.currentPlayer]++;
          game.pocketedThisTurn++;
          
          playSound('score');
          createFloatingScore(ball.x, ball.y, 1);
          updateUI();
        }
      }
      
      // Turn management - check if balls have stopped
      const ballsMoving = areBallsMoving();
      
      if (ballsMoving) {
        game.ballsStoppedFrames = 0;
      } else {
        game.ballsStoppedFrames++;
        
        // Safety: force stop all balls after 30 frames of being "still"
        // This prevents any edge cases where balls keep tiny velocities
        if (game.ballsStoppedFrames > 30 && !game.canShoot) {
          stopAllBalls();
          game.ballsStoppedFrames = 0;
        }
      }
      
      if (!ballsMoving || game.ballsStoppedFrames > 30) {
        updateHint();
        
        if (game.pocketedThisTurn > 0) {
          game.pocketedThisTurn = 0;
          
          if (game.mode === 'vs') {
            const activeTargets = game.targetBalls.filter(b => b.active).length;
            if (activeTargets > 0) {
              game.currentPlayer = 1 - game.currentPlayer;
            }
          }
        }
        
        // Re-enable shooting
        if (!game.canShoot) {
          game.canShoot = true;
        }
        
        checkGameOver();
      }
    }

    function checkGameOver() {
      const activeTargets = game.targetBalls.filter(b => b.active).length;
      
      if (activeTargets === 0 && !game.gameOver) {
        game.gameOver = true;
        setTimeout(showWinScreen, 500);
      }
    }

    function showWinScreen() {
      playSound('win');
      
      const totalBalls = LEVELS[game.currentLevel].balls;
      const par = totalBalls;  // Par is equal to number of balls
      const shots = game.shotsTaken;
      const isLastLevel = game.currentLevel >= LEVELS.length - 1;
      
      // Calculate score based on shots
      // Fewer shots = higher score
      let baseScore = 1000;
      let bonusPerShotSaved = 100;
      
      // If you match or beat par, get bonus
      let bonus = 0;
      if (shots <= par) {
        bonus = (par - shots + 1) * bonusPerShotSaved;
      }
      
      let totalScore = baseScore + bonus;
      
      // Calculate stars (1-3)
      // 1 star: completed
      // 2 stars: shots <= par + 1
      // 3 stars: shots <= par
      let stars = 1;
      if (shots <= par) {
        stars = 3;
      } else if (shots <= par + 2) {
        stars = 2;
      }
      
      // Update stars display
      const starsDisplay = document.getElementById('starsDisplay');
      const starElements = starsDisplay.querySelectorAll('.star');
      starElements.forEach((star, index) => {
        if (index < stars) {
          star.classList.add('earned');
        } else {
          star.classList.remove('earned');
        }
      });
      
      if (isLastLevel) {
        winText.textContent = '🎉 All Levels Complete!';
        document.getElementById('nextLevelBtn').textContent = 'Play Again';
      } else {
        winText.textContent = 'Level Complete!';
        document.getElementById('nextLevelBtn').textContent = 'Next Level →';
      }
      
      // Update score display
      document.getElementById('shotValue').textContent = shots;
      winScore.textContent = `Score: ${totalScore}`;
      
      winOverlay.classList.add('show');
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      drawGround();
      drawThrowingLine();
      
      if (game.figurePoints.length > 0) {
        drawFigure();
      }
      
      for (const ball of game.targetBalls) {
        if (ball.active) {
          drawBall(ball);
        }
      }
      
      drawCueBall();
      drawAimingLine();
    }

    function gameLoop() {
      updatePhysics();
      draw();
      requestAnimationFrame(gameLoop);
    }

    function getTouchPos(e) {
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches ? e.touches[0] : e;
      return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
    }

    function isOnCueBall(pos) {
      if (!game.cueBall || !game.canShoot) return false;
      const dx = pos.x - game.cueBall.x;
      const dy = pos.y - game.cueBall.y;
      return dx * dx + dy * dy < (game.cueBall.radius * 2.5) ** 2;
    }

    function handleStart(e) {
      e.preventDefault();
      initAudio();
      
      if (game.gameOver || !game.canShoot) return;
      
      const pos = getTouchPos(e);
      
      if (isOnCueBall(pos)) {
        game.dragging = true;
        game.dragStart = pos;
        game.dragEnd = pos;
        hintText.style.opacity = '0';
      }
    }

    function handleMove(e) {
      e.preventDefault();
      if (!game.dragging) return;
      game.dragEnd = getTouchPos(e);
    }

    function handleEnd(e) {
      e.preventDefault();
      
      if (!game.dragging || !game.cueBall || !game.canShoot) {
        game.dragging = false;
        return;
      }
      
      const dx = game.dragStart.x - game.dragEnd.x;
      const dy = game.dragStart.y - game.dragEnd.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist > 15) {
        const power = Math.min(dist * 0.12, 20);
        const angle = Math.atan2(dy, dx);
        
        game.cueBall.vx = Math.cos(angle) * power;
        game.cueBall.vy = Math.sin(angle) * power;
        
        game.canShoot = false;
        game.pocketedThisTurn = 0;
        game.shotsTaken++;  // Count this shot
        
        document.getElementById('shotValue').textContent = game.shotsTaken;
        document.getElementById('shotsDisplay').textContent = game.shotsTaken;
        
        playSound('push');
        updateHint();
        
        if (game.mode === 'vs') {
          game.currentPlayer = 1 - game.currentPlayer;
        }
      }
      
      game.dragging = false;
      hintText.style.opacity = '1';
    }

    // Event listeners
    canvas.addEventListener('touchstart', handleStart, { passive: false });
    canvas.addEventListener('touchmove', handleMove, { passive: false });
    canvas.addEventListener('touchend', handleEnd, { passive: false });
    canvas.addEventListener('mousedown', handleStart);
    canvas.addEventListener('mousemove', handleMove);
    canvas.addEventListener('mouseup', handleEnd);

    document.querySelectorAll('[data-mode]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        game.mode = btn.dataset.mode;
      });
    });

    document.getElementById('startBtn').addEventListener('click', () => {
      initAudio();
      menuOverlay.classList.add('hidden');
      setupLevel();
      initBalls();
    });

    document.getElementById('menuSoundBtn').addEventListener('click', () => {
      game.soundEnabled = !game.soundEnabled;
      const soundBtn = document.getElementById('soundBtn');
      const menuSoundBtn = document.getElementById('menuSoundBtn');
      
      if (game.soundEnabled) {
        soundBtn.textContent = '🔊';
        soundBtn.classList.remove('muted');
        if (menuSoundBtn) {
          menuSoundBtn.textContent = '🔊 Sound On';
          menuSoundBtn.classList.remove('muted');
        }
        initAudio();
        playSound('collide');
      } else {
        soundBtn.textContent = '🔇';
        soundBtn.classList.add('muted');
        if (menuSoundBtn) {
          menuSoundBtn.textContent = '🔇 Sound Off';
          menuSoundBtn.classList.add('muted');
        }
      }
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      setupLevel();
      initBalls();
    });

    document.getElementById('soundBtn').addEventListener('click', () => {
      game.soundEnabled = !game.soundEnabled;
      const soundBtn = document.getElementById('soundBtn');
      const menuSoundBtn = document.getElementById('menuSoundBtn');
      
      if (game.soundEnabled) {
        soundBtn.textContent = '🔊';
        soundBtn.classList.remove('muted');
        if (menuSoundBtn) {
          menuSoundBtn.textContent = '🔊';
          menuSoundBtn.classList.remove('muted');
        }
        // Play a test sound
        initAudio();
        playSound('collide');
      } else {
        soundBtn.textContent = '🔇';
        soundBtn.classList.add('muted');
        if (menuSoundBtn) {
          menuSoundBtn.textContent = '🔇';
          menuSoundBtn.classList.add('muted');
        }
      }
    });

    document.getElementById('nextLevelBtn').addEventListener('click', () => {
      winOverlay.classList.remove('show');
      
      if (game.currentLevel >= LEVELS.length - 1) {
        game.currentLevel = 0;
      } else {
        game.currentLevel++;
      }
      
      playSound('levelup');
      setupLevel();
      initBalls();
    });

    document.getElementById('menuBtn2').addEventListener('click', () => {
      winOverlay.classList.remove('show');
      menuOverlay.classList.remove('hidden');
      generateFigureButtons();
      updateLevelPreview();
    });

    window.addEventListener('resize', resizeCanvas);

    // Initialize
    generateFigureButtons();
    updateLevelPreview();
    resizeCanvas();
    setupLevel();
    initBalls();
    gameLoop();
  </script>
</body>
</html>
